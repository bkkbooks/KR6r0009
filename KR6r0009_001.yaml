body:
  text: 陳真諦譯文殊師利問經卷下分別部品第十五爾時文殊師利白佛言世尊佛入涅槃後未來弟子云何諸部分別云何根本佛告文殊師利未來我弟子有二十部能令諸法住世部者並得四果三藏平等無下中上譬如海水味無有異如人有二十子真實如來所說文殊師利根本二部從大乘出從般若波羅密出聲聞緣覺諸佛悉從般若波羅蜜出文殊師利如地水火風虛空是一切衆生所住處如是般若波羅蜜及大乘是一切聲聞緣覺諸佛出處文殊師利白佛言世尊云何名部佛告文殊師利初二部者一摩訶僧祇此言大衆老小同會共集律部也二體毗履此言老宿唯老宿人同會共出律部也我入涅槃後一百歲此二部當起後摩訶僧祇出七部於此百歲內出一部名執一語言所執與僧祇同故言一也於百歲內從執一語言部復出一部名出世間語言稱讚辭也於百歲內從出世間語言出一部名高拘梨部是出律主姓也於百歲內從高拘梨出一部名多聞出律主有多聞智也於百歲內從多聞出一部名只底舸此山名出律主居處也於百歲內從只底舸出一部名東山亦律主所居處也於百歲內從東山出一部名北山亦律主居處此謂從摩訶僧祇部出於七部及本僧祇是為八部於百歲內從體毗履部出十一部於百歲內出一部名一切語言律主執三世有故一切所語言也於百歲內從一切語言出一部名雪山亦律主行處也於百歲內從雪山出一部名犢子律主姓也於百歲內從犢子出一部名法勝律主名也於百歲內從法勝出一部名賢律主名也於百歲內從賢部出一部名一切所貴律主為通人所重也於百歲內從一切所貴出一部名芿山律主居處也於百歲內從芿山出一部名大不可棄律主初生母棄之井父追尋之雖墜不夭故云不棄也又名能射於百歲內從大不可棄出一部名法護律主名也於百歲內從法護出一部名迦葉比律主姓也於百歲內從迦葉比出一部名修妬路句律主執修妬路義也此謂體毗履部出十一部及體毗履成十二部佛說此祇夜摩訶僧祇部分別出有七體毗履十一是謂二十部十八及本二悉從大乘出無是亦無非我說未來起羅什法師集正覺涅槃後始滿百餘歲於茲異論興正法漸衰滅各各生異見建立於別衆危嶮甚可畏應生厭離心今於修多羅觀察佛正教依於真諦說求於堅固義猶如砂礫中求得真金寶我從先勝聞如來人中日佛滅度後百一十六年城名巴連弗時阿育王王閻浮提匡於天下爾時大僧別部異法時有比丘一名能二名因緣三名多聞說有五處以教衆生所謂從他饒益無知疑由觀察言說得道此是佛從始生二部一謂摩訶僧祇二謂他鞞羅秦言上座部也即此百餘年中摩訶僧祇部更生異部一名一說二名出世間說三名窟居又於一百餘年中摩訶僧祇部中復生異部名施設論又二百年中摩訶提婆外道出家住支提山於摩訶僧祇部中復建立三部一名支提加二名佛婆羅三名鬱多羅施羅如是摩訶僧祇中分為九部一名摩訶僧祇二名一說三名出世間說四名窟居五名多聞六名施設七名遊迦八名阿羅說九名鬱多羅施羅部至三百年中上座部中因諍論事立為異部一名薩婆多亦名因論先上座部二名雪山部即此三百年中於薩婆多部中更生異部名犢子即此三百年中犢子部復生異部一名達摩鬱多梨二名跋陀羅耶尼三名彌離亦言三彌底四名六城部即此三百年中薩婆多中更生異部名彌沙部彌沙部中復生異部因師主因執連名曇無德即此三百年中薩婆多部中更生異部名優梨沙亦名迦葉惟於四百年中薩婆多部中更生異部因大師鬱多羅名僧迦蘭多亦名修多羅論如是上座部中分為十二部一名上座部二名雪山三名薩婆多四名犢子五名達摩鬱多梨六名跋陀羅耶尼七名彌離底八名六城部九名彌沙塞十名曇無德十一名迦葉惟十二名修多羅論部今當說根本及中間義彼摩訶僧祇一說出世間說窟居此根本皆說佛世尊一切出世間無有如來是世間法如來一切說皆是轉法輪盡說一切事一切相一切義說如來色無邊光明無量壽命無量念信樂生無有厭足佛不睡眠無問思答無所言說常一其心群生無種種無數皆從如來聞說解如來一心知一切法一念相應慧覺一切法如來一切時盡智無生智常現在前乃至涅槃菩薩不愛母胎白象形降神母胎一切菩薩從右脅生菩薩無有愛想恚害想為衆生故願生惡趣成就一切煩惱衆生一切聞知觀生聖諦說有欲有離欲色無色界具六識身五根肉段眼不見色乃至身不覺觸禪定中間亦有言說亦調伏心亦攝受思惟一切作法無有處所須陀洹心數心知其自阿羅漢有從他饒益無知有疑由他觀察言說得道智慧方便得離生死亦得安樂從第八退乃至種性法亦說有退須陀洹退法阿羅漢亦有退法無世俗正見有世俗信根無有記法超升離生不一斷一切結須陀洹能作一切惡行唯除無間罪一切修多羅皆依了義九種無為法謂數滅非數滅虛空虛空處識處無所有處非想非非想處十二緣起支道支心性自淨佛為客煩惱所染諸使非心並心法無緣使異纏纏異使心不相應無有過去未來世法入非智知非無有治須陀洹得禪定如是等名根本所見中間見者隨其別觀察少有自作少有他作少有因緣起一時有二心俱生道即煩惱業想種子即是取諸根四大轉變相續非心心法心滿身中皆可得如是皆攝受欲是名中間所見也彼多聞根本見者佛說五種出世間法無常苦空無我寂滅涅槃出道餘者世俗阿羅漢有從他饒益有無知有疑由他觀察言說得道諸餘一切薩婆多見同也彼施設根本見者若說諸陰即非業諸不成諸行展轉施設者無智士夫事無橫死由本業所得長養業根生一切苦從業生福德生聖道道不修亦不失餘一切與摩訶僧祇見同也彼支提羅阿婆鬱多羅施羅根本見者菩薩離惡趣供養偷婆無大果報阿羅漢有他饒益無知有疑由他觀察言說得道餘者一切與摩訶僧祇同見彼薩婆多根本見者說一切有性二種攝一切法謂名及色有道共未來世有法入知法識明法生住滅有為相三無為三諦有為相一諦無為相四諦次第無間等空無相無願超升離生思惟欲界繫超升超升離生十五心為向第十六心名為住果世間第一法一心前三方便有退世間第一不退須陀洹果是不退法阿羅漢有退法非一切阿羅漢得無生智凡夫得離欲瞋恚外道有五通諸天亦得修梵行於七正得覺支非餘禪攝念處不依禪得超升離生得阿羅漢果色界得阿羅漢果而不得超升離生無有北鬱單越人得離欲彼亦不得聖道無想天亦不必次第得四沙門果超升離生以世俗得斯陀含阿那含果四念處一切法諸使心相應一切使是有纏而非使緣起支是有為說阿羅漢有緣起支阿羅漢有功德增長欲界色界有中陰五識身是有欲五識身還自相應非思惟非心數法心心是緣自性自性不相應心不相應有世俗正見有世俗信根有無願阿羅漢無有學法一切阿羅漢得禪而不必現前阿羅漢有宿業受報有凡夫不善心命終正受中無命終菩薩是凡夫有結使未超升離生未超凡夫地受身衆生數施設一切行磨滅無法從此世至他世俗數說言有此世至他世命未終諸行取已盡無有法轉變有出世間禪有覺有觀無漏有善是因禪定中無言說八聖道是法輪非如來一切說是轉法輪佛不說一切事非一切說如義非一切契經是了義有如是等無量中間見也彼雪山部根本見者菩薩凡夫離無明淨佛國土降神母胎外道無五通諸天不得修梵行有阿羅漢從他饒益無知疑由他觀察言說得道諸餘一切有薩婆多見同彼犢子部根本見者非即是人亦非離陰界入和合施設故一切陰剎那不住離人無有法從此世至他世當說人至彼外道有五通五識身非有欲亦非離欲欲界繫結使修道斷得離欲非見諦斷忍名相世間第一法超升離生十二心起名向第十三心名為住果與見者多梨羅耶尼三彌底六城有諸有別說偈分別得說而復墮墮已深貪著從業而得業彼彌沙塞部根本見者無過去未來世唯有現在及無為於四真諦一無間等見苦即名見諦苦者即名見真諦諸使非心心諸非有緣使異纏纏亦異使心不相應纏與心相應凡夫不欲瞋恚外道無五通諸天不得修梵行無中陰阿羅漢無有功德增益五識身有欲亦離欲六識身覺觀相應無有世俗正見無世俗信根無有出世間禪無覺出世間法無有善為因須陀洹有退法阿羅漢亦有退法道支是念處攝有九無為事謂數滅非數滅虛空善法也不善法如無記法如道緣起如從胎乃至死諸根四大轉變自滅心心數法亦轉變自滅佛僧中可得施僧得大果報非佛佛與聲聞同一道一解脫一切行剎那無有法從此世至他世如是等根本見同此等諸中間見者有過去未來世有中陰法入知法識法思業無有身業口業覺觀心相應太地住劫供養偷婆少果報法現在前名使陰界入現在前已法種子能生諸苦謂無明渴愛見業是名中間見法也彼曇無德根本見者佛非僧中可得施佛得大果報非僧佛道異聲聞道外道無有五通羅漢身是無漏餘一切與摩訶僧祇部同見也彼迦葉惟部根本見者有斷法斷知無有不斷法而斷知業熟而受報不熟不受報有過去因果無有未來因果有一切法剎那有覺法有報餘一切與曇無德部同見彼相續部根本見者陰從此世至他世非離聖道得滅陰陰有約根本有第一人餘一切與薩婆多部見同是略說一切部見按此論者宋藏中錯重寫彼部異執論名為十八部論故今取此國本為正開元録云右十八部論群録並云梁代三藏真諦所譯今詳真諦三藏已譯十八部論不合更譯部異執論其十八部論初首引文殊問經分別部品後次云羅什法師集後方是論若是羅什所翻秦時未有文殊問經不合引之置於初也或可準別録中文殊問經編為失譯秦時引證此亦無疑若是真諦再譯論中子注不合有秦言之字詳其文理多是秦時羅什譯出諸録脫編致有疑焉其真諦十八部疏即部異執疏是雖有斯理未敢指南後諸博聞請求實録
