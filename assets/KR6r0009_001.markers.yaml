  - {type: variant, offset: 3282, length: 208, content: 按此論者宋藏中錯重寫。彼部異執論。名為十八部論故今取此國本為正。開元錄云右十八部論群錄並云。梁代三藏真諦所譯。今詳真諦三藏已譯十八部論。不合更譯部異執論。其十八部論初首引文殊問經分別部品。後次云羅什法師集後方是論。若是羅什所翻。秦時未有文殊問經。不合引之置於初也。或可準別錄中文殊問經編為失譯。秦時引證此亦無疑。若是真諦再譯。論中子注不合有秦言之字。詳其文理多是秦時羅什譯出。諸錄脫編致有疑焉。其真諦十八部疏。即部異執疏是雖有斯理未敢指南。後諸博聞請求實錄, 宋: '', 元: '', 明: '', 宮: ''}
